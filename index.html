<body>
    <!--script src='synth.js'></script>
<script type='module' src='ui3test.js'></script-->

    <head>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://threejs.org/build/three.module.js",
                    "three/addons/": "https://threejs.org/examples/jsm/",
                    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js",
                    "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js",
                    "three-subdivide": "https://cdn.jsdelivr.net/npm/three-subdivide@1.1.2/build/index.module.js"
                }
            }</script>
    </head>
    <script type='module'>
        import App3 from "./src/App3.js"
        // Imports
        import FishParams, { SimConfig, SimConfigDefaults } from "./src/FishParams.js"
        import GUI from "lil-gui"
        import FishSwarm from "./src/FishSwarm.js"
        import FishTank from "./src/FishTank.js"

        let app = App3.getApp();
        let THREE = App3.THREE;

        // PRNG (Mulberry32)
        Math.seededRandom = function (a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        };
        Math.random = Math.seededRandom(window.SimConfig.SEED);

        // Setup App and Components first
        app.THREE = THREE;
        app.App3 = App3;
        app.assetRoot = '';
        let fs = new FishSwarm(app);
        let ft = new FishTank(app);
        import Bubbles from "./src/Bubbles.js"
        let bubbles = new Bubbles(app, 500); // Create 500 bubbles

        import FishShader from "./src/FishShader.js"

        // Lighting
        app.renderer.shadowMap.enabled = true;
        app.renderer.shadowMap.type = THREE.PCFShadowMap;
        app.renderer.shadowMap.blurSamples = 8;
        // Tune main camera for the 500-unit scene scale
        app.camera.near = 1.0;
        app.camera.far = 1000.0;
        app.camera.updateProjectionMatrix();

        let sun = new THREE.DirectionalLight('white', 2.9);
        sun.position.set(0, 70, 0); // Slightly higher for better shadow volume
        sun.castShadow = true;

        // Shadow Bias and scale tuning
        sun.shadow.bias = -0.005; // Small negative bias to prevent shadow acne
        sun.shadow.normalBias = 0.02; // Normal bias is great for preventing z-fighting on slopes (dunes)
        sun.shadow.mapSize.set(2048, 2048);

        // Match shadow volume to scene size (~300-400 radius)
        sun.shadow.camera.right = sun.shadow.camera.top = 100;
        sun.shadow.camera.bottom = sun.shadow.camera.left = -100;
        sun.shadow.camera.far = 200;
        sun.shadow.camera.near = 1;
        sun.shadow.intensity = .5;
        sun.shadow.radius = 3.;

        sun.shadow.camera.updateProjectionMatrix();
        app.scene.add(sun);

        let ambient = new THREE.AmbientLight('white', .35);
        app.scene.add(ambient);

        // Setup GUI
        app.gui = new GUI({ title: 'Tank Settings' });

        // Hide GUI securely by default, toggle with spacebar
        app.gui.hide();
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (app.gui._hidden) app.gui.show();
                else app.gui.hide();
            }
        });

        // Environment Folder
        let envFolder = app.gui.addFolder('Environment');
        let fogConf = { color: '#57a5ed', near: app.scene.fog.near, far: app.scene.fog.far };

        envFolder.addColor(fogConf, 'color').name('Fog Color').onChange(v => {
            app.scene.fog.color.set(v);
            app.renderer.setClearColor(v);
        });
        envFolder.add(fogConf, 'near', -500, 500).name('Fog Near').onChange(v => app.scene.fog.near = v);
        envFolder.add(fogConf, 'far', 0, 1000).name('Fog Far').onChange(v => app.scene.fog.far = v);

        // Lighting Folder
        let lightFolder = envFolder.addFolder('Lighting');
        let lightConf = {
            ambientColor: ambient.color.getHex(),
            ambientIntensity: ambient.intensity,
            sunColor: sun.color.getHex(),
            sunIntensity: sun.intensity,
            sunX: sun.position.x,
            sunY: sun.position.y,
            sunZ: sun.position.z,
        };

        lightFolder.addColor(lightConf, 'ambientColor').name('Ambient Color').onChange(v => ambient.color.setHex(v));
        lightFolder.add(lightConf, 'ambientIntensity', 0, 1).name('Ambient Level').onChange(v => ambient.intensity = v);
        lightFolder.addColor(lightConf, 'sunColor').name('Sun Color').onChange(v => sun.color.setHex(v));
        lightFolder.add(lightConf, 'sunIntensity', 0, 5).name('Sun Intensity').onChange(v => sun.intensity = v);
        lightFolder.add(lightConf, 'sunX', -100, 100).name('Sun X').onChange(v => sun.position.x = v);
        lightFolder.add(lightConf, 'sunY', -100, 100).name('Sun Y').onChange(v => sun.position.y = v);
        lightFolder.add(lightConf, 'sunZ', -100, 100).name('Sun Z').onChange(v => sun.position.z = v);

        envFolder.addColor(window.SimConfig, 'duneColor').name('Dune Color').onChange(v => {
            if (ft.duneMesh) ft.duneMesh.material.color.set(v);
        });

        envFolder.close();

        // Cam Control parameters
        let camFolder = app.gui.addFolder('Camera Controls');
        let camConf = { autoRotate: true };
        camFolder.add(camConf, 'autoRotate').name('Auto Rotate').onChange(v => app.controls.autoRotate = v);
        camFolder.close();

        // Caustic Parameters
        let causticFolder = app.gui.addFolder('Caustic Tweaks');
        let causticConf = {
            baseColor: '#99aeff',
            speed: 1.5,
            scale: 3.0
        };

        causticFolder.addColor(causticConf, 'baseColor').name('Caustic Color').onChange(v => {
            if (FishShader.caustics && FishShader.caustics.uniforms)
                FishShader.caustics.uniforms.uBaseColor.value.set(v);
        });
        causticFolder.add(causticConf, 'speed', 0.1, 20.0).name('Caustic Speed').onChange(v => {
            if (FishShader.caustics && FishShader.caustics.uniforms)
                FishShader.caustics.uniforms.uSpeed.value = v;
        });
        causticFolder.add(causticConf, 'scale', 0.1, 20.0).name('Caustic Scale').onChange(v => {
            if (FishShader.caustics && FishShader.caustics.uniforms)
                FishShader.caustics.uniforms.uScale.value = v;
        });
        causticFolder.close();

        // Fish parameters
        let fishFolder = app.gui.addFolder('Fish Params');
        let guiWobble = fishFolder.addFolder('Wobble Config');
        if (FishShader.paramUniform && FishShader.paramUniform.value) {
            guiWobble.add(FishShader.paramUniform.value, 'x', 0.0, 50.0).name('Frequency');
            guiWobble.add(FishShader.paramUniform.value, 'y', 0.0, 0.05).name('Speed/Width');
            guiWobble.add(FishShader.paramUniform.value, 'z', 0.0, 0.5).name('Magnitude');
        }

        fishFolder.add(FishParams, 'fishSpeedMult', 0, 5).name('Swim Speed Mult');
        fishFolder.add(FishParams, 'oceanSurfaceY', 0, 100).name('Swim Top');
        fishFolder.add(FishParams, 'oceanFloorY', -20, 20).name('Swim Bottom');

        // Simulation Config
        let simFolder = app.gui.addFolder('Simulation Config');
        
        window.SimConfig.FPS = 0;
        let fpsController = simFolder.add(window.SimConfig, 'FPS').name('FPS').disable();
        let frameCount = 0;
        let lastFpsTime = performance.now();

        // Use window.SimConfig directly for the UI
        let applyRebuild = () => {
            sessionStorage.setItem('fishSimConfig', JSON.stringify(window.SimConfig));
            // Trigger in-situ rebuilds
            if (fs && fs.rebuildFish) fs.rebuildFish();
            if (ft && ft.rebuildCorals) ft.rebuildCorals();
        };

        app.addEventListener('frame', (e) => {
            frameCount++;
            let now = performance.now();
            if (now - lastFpsTime >= 1000) {
                window.SimConfig.FPS = Math.round((frameCount * 1000) / (now - lastFpsTime));
                fpsController.updateDisplay();
                frameCount = 0;
                lastFpsTime = now;
            }
        });

        simFolder.add(window.SimConfig, 'SEED', 0, 1000000, 1).name('Seed').onFinishChange(applyRebuild);
        simFolder.add(window.SimConfig, 'NUM_FISH', 10, 5000, 10).name('Fish Count').onFinishChange((v) => {
            if (FishParams) FishParams.NUM_FISH = v;
            applyRebuild();
        });
        simFolder.add(window.SimConfig, 'TICK_RATE', 1, 200, 1).name('Sim Speed');
        simFolder.close();

        let coralFolder = app.gui.addFolder('Coral Config');
        coralFolder.add(window.SimConfig, 'CORAL_COUNT', 0, 1000, 1).name('Count').onFinishChange(applyRebuild);
        coralFolder.add(window.SimConfig, 'CORAL_SCALE', 0, 5000, 1).name('Base Scale').onFinishChange(applyRebuild);
        coralFolder.add(window.SimConfig, 'CORAL_SCALE_VAR', 0, 5000, 1).name('Scale Variance').onFinishChange(applyRebuild);
        coralFolder.close();
        fishFolder.close();

        // About / Attribution
        let aboutFolder = app.gui.addFolder('About');
        let aboutData = {
            app: "Fish! by Thrax (manthrax@gmail.com) (CC-BY)",
            corals: "Coral by Kanna-Nakajima (CC-BY)"
        };
        //aboutFolder.add(aboutData, 'corals').name('Models').disable();
        aboutFolder.add({ link: () => window.open("https://github.com/manthrax/fish", '_blank') }, 'link').name(aboutData.app);
        aboutFolder.add({ link: () => window.open("https://sketchfab.com/Kanna-Nakajima", '_blank') }, 'link').name(aboutData.corals);
    
        // Reset Button
        app.gui.add({
            reset: () => {
                sessionStorage.removeItem('fishSimConfig');
                sessionStorage.removeItem('fishGuiState');
                window.location.reload();
            }
        }, 'reset').name('Reset to Defaults');

        let isLoadingGui = false;
        // Restore GUI state from previous sesson if available
        let savedGui = sessionStorage.getItem('fishGuiState');
        if (savedGui) {
            isLoadingGui = true;
            app.gui.load(JSON.parse(savedGui));
            isLoadingGui = false;
        }

        // Save GUI state automatically whenever any parameter is changed
        app.gui.onChange(() => {
            if (!isLoadingGui) sessionStorage.setItem('fishGuiState', JSON.stringify(app.gui.save()));
        });
    </script>
</body>
